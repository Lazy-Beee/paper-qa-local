[paths]
# Paths are resolved relative to the project root unless absolute.
paper_dir = "data/"
index_dir = "data/index"

[llm]
# OpenAI-compatible endpoint (LM Studio, vLLM, Ollama, etc.)
api_base = "http://localhost:1234/v1"
api_key = "lm-studio"

# Model used for chat / summary / agent / enrichment
chat_model = "qwen2.5-14b-instruct"

# Embedding model. `embedding_alias` is the name paper-qa references.
embedding_model = "text-embedding-qwen3-embedding-4b"
embedding_alias = "lmstudio-embedding"

[index]
recurse_subdirectories = false

[answer]
evidence_k = 10
answer_max_sources = 5
max_concurrent_requests = 2

[reranker]
# Cross-encoder rerank step inserted between embedding retrieval and the
# LLM summary stage. Disable to skip entirely.
enabled = true
model = "qwen3-reranker-0.6b"
# How many extra candidates to pull from embedding search before reranking.
# Final pool passed downstream is still `evidence_k`; we just pick from
# `evidence_k * oversample` candidates after reranking.
oversample = 3
# Max parallel reranker calls to LM Studio.
max_concurrent_requests = 8
instruct = "Given a search query, retrieve relevant passages that answer the query"

[parsing]
multimodal = false
use_doc_details = false
disable_doc_valid_check = true
